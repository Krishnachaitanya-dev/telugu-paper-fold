name: CI — Typecheck · Test · E2E

on:
  push:
    branches: [main, master, develop, 'feat/**']
  pull_request:
    branches: [main, master]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: corepack enable && corepack prepare pnpm@10.6.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit-tests:
    name: Vitest
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      EXPO_PUBLIC_SUPABASE_URL:      ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: corepack enable && corepack prepare pnpm@10.6.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      CI: true
      EXPO_PUBLIC_SUPABASE_URL:      ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: corepack enable && corepack prepare pnpm@10.6.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: playwright-report/

  build-apk:
    name: Android APK (preview)
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      EXPO_PUBLIC_SUPABASE_URL:      ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - run: corepack enable && corepack prepare pnpm@10.6.3 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec expo prebuild --platform android --clean --no-install
      - run: cd android && chmod +x gradlew && ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: insta-news-telugu-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
